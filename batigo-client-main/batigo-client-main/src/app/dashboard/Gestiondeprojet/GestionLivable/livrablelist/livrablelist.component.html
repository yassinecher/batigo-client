<div class="container">
    <h2>Deliverable List</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Status</th>
                <th>Expected Delivery Date</th>
                <th>Actual Delivery Date</th>
                <th>Comment</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let livrable of livrables">
                <td>{{ livrable.nom }}</td>
                <td>{{ livrable.type }}</td>
                <td>{{ livrable.statut }}</td>
                <td>{{ livrable.dateRemisePrevue | date }}</td>
                <td>{{ livrable.dateRemiseReelle | date }}</td>
                <td>{{ livrable.commentaire }}</td>
                <td>
                    <button class="btn btn-primary" [routerLink]="['/update', livrable.id]">Edit</button>
                    <button class="btn btn-danger" (click)="deleteLivrable(livrable.id)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
